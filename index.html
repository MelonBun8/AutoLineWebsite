<!DOCTYPE html>
<html>
    
    <head>
        <meta charset = "UTF-8"> <!-- These things like charset in the opening tags are known as attributes-->
        <meta name = "Description:" content = "Autoline Showroom Karachi | Official Website">
        <title>
            AutoLine Showroom | Home Page
        </title>
        <link rel="icon" href="images/favicon.png">
        <!--including the link to the external css stylesheet -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace&family=Racing+Sans+One&display=swap" rel="stylesheet">

        <link href = "style.css", rel = "stylesheet">
        <script src = "script.js"></script>
        
    </head>


    <body>


        <header>

            <div id = "headingPart">
                <nav class = "headerSection">
                    
                    <div id = "leftHeaderSection">
                        <img src = "images/LogoGreen.png" width = 300px alt = "logo"/> 
                    </div> 

                    <div id = "rightHeaderSection">
                        <button id = "butt1" type="button" onclick=openNewPage(2)>View Catalog</button>
                        <button id = "butt2" type="button" onclick=openNewPage(3)>Get In Touch</button>
                        <button id = "butt3" type="button" onclick=openNewPage(4)>Contact & About</button>
                        <button id = "butt4" type="button" onclick=openNewPage(5)>Sign In / Up</button>
                    </div>


                </nav>
            </div>

            <div class = landingHeading>
                <h1>Welcome to Autoline</h1>    
            </div>

            <div class = landingVideo>
                    <video width="720" height="405" controls poster="images/Thumbnail.png">
                    <source src="StockCarVid.mp4" type="video/mp4">
                  Your browser does not support the video tag.
                  </video>
            </div>
            
        </header>
        <!--Maybe add arrow button below to move to catalog-->

        <main>
            <div class = "landingCatalogHeading">
                <h2>What we offer you:</h2>
            </div>

            <div class = "landingGridHolder">
                <div class = "landingCatalogGrid">
                    <div class="box" id = "box a">
                        <img src = "images/hatchback.jpg">
                        <div class="centered">Hatchbacks</div>
                    </div>
                    <div class="box" id = "box b">
                        <img src = "images/Sedan.jpg">
                        <div class="centered">Sedans</div>
                    </div>
                    <div class="box" id = "box c">
                        <img src = "images/Truck.jpg">
                        <div class="centered">Trucks</div>
                    </div>
                    <div class="box" id = "box d">
                        <img src = "images/SUV.jpg">
                        <div class="centered">SUVs</div>
                    </div>
                </div>

            </div>
        </main>
 

        <footer>

        </footer>


    </body>


</html>
